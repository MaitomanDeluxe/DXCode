<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DXCode - Professional IDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <div id="menu-bar">
            <div style="margin-right: 20px; font-weight: bold; color: #fff;">DXCode</div>
            <div class="menu-item">ファイル</div>
            <div class="menu-item">編集</div>
            <div class="menu-item">表示</div>
        </div>

        <div id="main-content">
            <div id="activity-bar">
                <div class="activity-icon active" data-view="explorer" title="エクスプローラー"><i class="far fa-copy"></i></div>
                <div class="activity-icon" data-view="search" title="検索"><i class="fas fa-search"></i></div>
                <div class="activity-icon" data-view="extensions" title="拡張機能"><i class="fas fa-puzzle-piece"></i></div>
            </div>

            <div id="sidebar-container">
                <div id="sidebar-header">エクスプローラー</div>
                
                <div id="view-explorer" class="sidebar-view">
                    <div id="action-buttons">
                        <button id="new-file-btn" title="新規ファイル">+ New</button>
                        <button id="download-zip-btn" title="ZIP保存"><i class="fas fa-file-archive"></i> ZIP</button>
                        <button id="preview-btn" style="display:none;"><i class="fas fa-play"></i> Run</button>
                    </div>
                    <ul id="file-list"></ul>
                </div>

                <div id="view-search" class="sidebar-view" style="display:none; padding:10px;">
                    <input type="text" id="search-input" class="search-box" placeholder="検索">
                    <input type="text" id="replace-input" class="search-box" placeholder="置換">
                    <button id="replace-all-btn" class="action-btn">すべて置換</button>
                    <div id="search-results" style="margin-top:15px; font-size:11px; color:#888;">全ファイルから検索し一括置換します</div>
                </div>

                <div id="view-extensions" class="sidebar-view" style="display:none; padding:10px;">
                    <div class="ext-item">
                        <div class="ext-info"><strong>Prettier</strong><p>コード整形を有効化</p></div>
                        <button class="ext-btn active">有効</button>
                    </div>
                    <div class="ext-item">
                        <div class="ext-info"><strong>Python Linter</strong><p>Pyflakes解析</p></div>
                        <button class="ext-btn">無効</button>
                    </div>
                </div>
            </div>

            <div id="editor-area">
                <div id="tab-bar"></div>
                <div id="monaco-editor"></div>
            </div>
        </div>

        <div id="status-bar">
            <div class="status-item"><i class="fas fa-code-branch"></i> main*</div>
            <div style="flex-grow: 1;"></div>
            <div class="status-item">UTF-8</div>
            <div class="status-item">Spaces: 4</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
