<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DXCode - Professional Web Editor</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DXCode">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <div id="menu-bar">
            <div class="menu-item">ファイル(F)</div>
            <div class="menu-item">編集(E)</div>
            <div class="menu-item">選択(S)</div>
            <div class="menu-item">表示(V)</div>
            <div class="menu-item">ヘルプ(H)</div>
            <div style="flex-grow: 1; -webkit-app-region: drag;"></div>
            <div id="project-title">DXCode Project</div>
        </div>

        <div id="main-content">
            <div id="activity-bar">
                <div class="activity-icon active" data-view="explorer" title="エクスプローラー"><i class="fas fa-copy"></i></div>
                <div class="activity-icon" data-view="search" title="検索"><i class="fas fa-search"></i></div>
                <div class="activity-icon" data-view="source-control" title="ソース管理"><i class="fas fa-code-branch"></i></div>
                <div class="activity-icon" data-view="run" title="実行とデバッグ"><i class="fas fa-play"></i></div>
                <div class="activity-icon" data-view="extensions" title="拡張機能"><i class="fas fa-puzzle-piece"></i></div>
            </div>

            <div id="sidebar-container">
                <div id="sidebar-header">エクスプローラー</div>
                
                <div id="view-explorer" class="sidebar-view" style="display: block;">
                    <div id="action-buttons">
                        <button id="new-file-btn" title="新規作成">+ New File</button>
                        <button id="download-zip-btn" title="ZIPダウンロード"><i class="fas fa-file-archive"></i> ZIP</button>
                        <button id="preview-btn" title="実行" style="display: none;"><i class="fas fa-play"></i> Run</button>
                    </div>
                    <ul id="file-list"></ul>
                </div>

                <div id="view-search" class="sidebar-view" style="display: none; padding: 10px;">
                    <input type="text" id="search-input" placeholder="検索..." style="width:100%; padding:6px; background:#3c3c3c; color:white; border:1px solid #555;">
                    <button id="search-btn" style="width:100%; margin-top:8px; padding:6px; background:#007acc; color:white; border:none; cursor:pointer;">検索実行</button>
                    <ul id="search-results" style="margin-top:15px; list-style:none; padding:0; font-size:13px;"></ul>
                </div>

                <div id="view-source-control" class="sidebar-view" style="display: none; padding: 10px;">
                    <div style="font-size:12px; color:#888; margin-bottom:10px;">すべての変更はローカルDBに同期されています。</div>
                    <button id="force-save-btn" style="width:100%; padding:6px; background:#333; color:white; border:1px solid #555; cursor:pointer;">IndexedDBへ強制保存</button>
                </div>

                <div id="view-run" class="sidebar-view" style="display: none; padding: 10px;">
                    <button id="sidebar-run-btn" style="width:100%; padding:10px; background:#4CAF50; color:white; border:none; cursor:pointer;"><i class="fas fa-play"></i> プレビューを起動</button>
                </div>

                <div id="view-extensions" class="sidebar-view" style="display: none; padding: 10px;">
                    <div class="ext-card">
                        <strong>Prettier Mini</strong>
                        <p>コードを綺麗に整形します</p>
                        <button id="ext-format-btn">フォーマット</button>
                    </div>
                    <div class="ext-card">
                        <strong>Theme Switcher</strong>
                        <p>エディタの配色を変更</p>
                        <button id="ext-theme-btn">テーマ切替</button>
                    </div>
                </div>
            </div>

            <div id="editor-area">
                <div id="tab-bar"></div>
                <div id="monaco-editor"></div>
            </div>
        </div>

        <div id="status-bar">
            <div class="status-item"><i class="fas fa-check"></i> 準備完了</div>
            <div style="flex-grow: 1;"></div>
            <div id="status-file-info" class="status-item">UTF-8</div>
            <div id="fps-counter" class="status-item">FPS: --</div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
