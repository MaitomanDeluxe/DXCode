<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DXCode - Ultimate IDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <div id="menu-bar">
            <div style="font-weight: bold; color: #fff; margin-right: 20px;">DXCode</div>
            <div class="menu-item">File</div><div class="menu-item">Edit</div><div class="menu-item">View</div>
        </div>

        <div id="main-content">
            <div id="activity-bar">
                <div class="activity-icon active" data-view="explorer" title="エクスプローラー"><i class="far fa-copy"></i></div>
                <div class="activity-icon" data-view="search" title="検索"><i class="fas fa-search"></i></div>
                <div class="activity-icon" data-view="extensions" title="拡張機能"><i class="fas fa-puzzle-piece"></i></div>
            </div>

            <div id="sidebar-container">
                <div id="sidebar-header">EXPLORER</div>
                
                <div id="view-explorer" class="sidebar-view">
                    <div id="action-buttons">
                        <button id="new-file-btn">+ New</button>
                        <button id="download-zip-btn"><i class="fas fa-file-archive"></i> ZIP</button>
                        <button id="preview-btn" style="display:none;"><i class="fas fa-play"></i> Run</button>
                    </div>
                    <ul id="file-list"></ul>
                </div>

                <div id="view-search" class="sidebar-view" style="display:none; padding:10px;">
                    <input type="text" id="search-input" class="search-box" placeholder="Search">
                    <input type="text" id="replace-input" class="search-box" placeholder="Replace">
                    <button id="replace-all-btn" class="action-btn">Replace All</button>
                    <div id="search-results" style="margin-top:10px; font-size:11px; color:#666;">全ファイルの内容を置換します</div>
                </div>

                <div id="view-extensions" class="sidebar-view" style="display:none; padding:10px;">
                    <div class="ext-card">
                        <div class="ext-title">Prettier</div>
                        <div class="ext-desc">Code formatter</div>
                        <button class="ext-btn active">Enabled</button>
                    </div>
                    <div class="ext-card">
                        <div class="ext-title">Python InteliSense</div>
                        <div class="ext-desc">Linter & Autocomplete</div>
                        <button class="ext-btn">Disabled</button>
                    </div>
                </div>
            </div>

            <div id="editor-area">
                <div id="tab-bar"></div>
                <div id="monaco-editor"></div>
            </div>
        </div>

        <div id="status-bar">
            <div class="status-item"><i class="fas fa-code-branch"></i> main*</div>
            <div style="flex-grow:1"></div>
            <div class="status-item">UTF-8</div>
            <div class="status-item">JavaScript</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
