<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DXCode - Professional IDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <div id="menu-bar">
            <div class="menu-item">ファイル</div><div class="menu-item">編集</div><div class="menu-item">表示</div>
            <div style="flex-grow: 1;"></div>
            <div id="project-title" style="font-size: 12px; opacity: 0.7;">DXCode v1.1</div>
        </div>

        <div id="main-content">
            <div id="activity-bar">
                <div class="activity-icon active" data-view="explorer" title="エクスプローラー"><i class="fas fa-copy"></i></div>
                <div class="activity-icon" data-view="search" title="検索"><i class="fas fa-search"></i></div>
                <div class="activity-icon" data-view="source-control" title="ソース管理"><i class="fas fa-code-branch"></i></div>
                <div class="activity-icon" data-view="run" title="実行とデバッグ"><i class="fas fa-play"></i></div>
                <div class="activity-icon" data-view="extensions" title="拡張機能"><i class="fas fa-puzzle-piece"></i></div>
            </div>

            <div id="sidebar-container">
                <div id="sidebar-header">エクスプローラー</div>
                
                <div id="view-explorer" class="sidebar-view" style="display: block;">
                    <div id="action-buttons">
                        <button id="new-file-btn">+ New</button>
                        <button id="download-zip-btn"><i class="fas fa-file-archive"></i> ZIP</button>
                        <button id="preview-btn" style="display: none; background: #4CAF50;"><i class="fas fa-play"></i> Run</button>
                    </div>
                    <ul id="file-list"></ul>
                </div>

                <div id="view-search" class="sidebar-view" style="display: none; padding: 10px;">
                    <input type="text" id="search-input" placeholder="全ファイルを検索..." class="side-input">
                    <button id="search-btn" class="side-btn">検索</button>
                    <ul id="search-results" class="result-list"></ul>
                </div>

                <div id="view-source-control" class="sidebar-view" style="display: none; padding: 10px;">
                    <p style="font-size:12px; color:#888;">変更はブラウザに自動保存されています</p>
                    <button id="force-save-btn" class="side-btn">IndexedDBに強制同期</button>
                </div>

                <div id="view-run" class="sidebar-view" style="display: none; padding: 10px;">
                    <button id="sidebar-run-btn" class="side-btn" style="background:#4CAF50;"><i class="fas fa-play"></i> プレビュー開始</button>
                </div>

                <div id="view-extensions" class="sidebar-view" style="display: none; padding: 10px;">
                    <div class="ext-card">
                        <strong>Prettier Linter</strong>
                        <p>コードを標準形式に整形</p>
                        <button id="ext-format-btn">整形を実行</button>
                    </div>
                    <div class="ext-card">
                        <strong>Theme Engine</strong>
                        <p>エディタのテーマ切り替え</p>
                        <button id="ext-theme-btn">テーマ切替</button>
                    </div>
                </div>
            </div>

            <div id="editor-area">
                <div id="tab-bar"></div>
                <div id="monaco-editor"></div>
                
                <div id="bottom-panel">
                    <div id="panel-header">
                        <div class="panel-tab active">デバッグコンソール</div>
                        <div style="flex-grow: 1;"></div>
                        <button id="clear-console-btn"><i class="fas fa-ban"></i></button>
                        <button id="close-panel-btn"><i class="fas fa-times"></i></button>
                    </div>
                    <div id="console-output"></div>
                </div>
            </div>
        </div>

        <div id="status-bar">
            <div class="status-item"><i class="fas fa-check"></i> Ready</div>
            <div style="flex-grow: 1;"></div>
            <div id="fps-counter" class="status-item">FPS: --</div>
            <div class="status-item">UTF-8</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
